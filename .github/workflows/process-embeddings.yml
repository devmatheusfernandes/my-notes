name: Process Embeddings Queue

on:
  schedule:
    - cron: '0 0,3,6 * * *' # Runs at 00:00, 03:00, and 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Process Queue API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          
          curl -f -X POST "https://$APP_URL/api/cron/process-queue" \
          -H "Authorization: Bearer $CRON_SECRET" \
          -H "Content-Type: application/json"

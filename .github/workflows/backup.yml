name: CapyNotes Nightly Backup

on:
  schedule:
    # 2:00 AM UTC and 3:00 AM UTC
    - cron: '0 2,3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Trigger Backup API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          
          curl -f -X GET "https://$APP_URL/api/cron/auto-backup" \
          -H "Authorization: Bearer $CRON_SECRET"
